<div class="ips-policy-container">
  <mat-accordion class="expansion-panel">
    <mat-expansion-panel expanded="true">
      <mat-expansion-panel-header>
        <mat-panel-title>
          <mat-icon class="panel-icon">security</mat-icon>
          IPS Policy Summary
        </mat-panel-title>
      </mat-expansion-panel-header>

      <div class="table-container">
        <table mat-table [dataSource]="ipsData" class="ips-table">
          <!-- Number Column -->
          <ng-container matColumnDef="number">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let element; let i = index">
              {{ i + 1 }}.
            </td>
          </ng-container>

          <!-- IPS Rule Column -->
          <ng-container matColumnDef="ipsRule">
            <th mat-header-cell *matHeaderCellDef>IPS_Rule_...</th>
            <td mat-cell *matCellDef="let element">
              {{ getDisplayValue(element.decRuleAction) }}
            </td>
          </ng-container>

          <!-- URL Column -->
          <ng-container matColumnDef="url">
            <th mat-header-cell *matHeaderCellDef>
              URL
              <mat-icon class="sort-icon">keyboard_arrow_down</mat-icon>
            </th>
            <td mat-cell *matCellDef="let element">
              {{ element.value | number }}
            </td>
          </ng-container>

          <!-- Percentage Column -->
          <ng-container matColumnDef="percentage">
            <th mat-header-cell *matHeaderCellDef>(%)</th>
            <td mat-cell *matCellDef="let element">{{ element.ipsUrl }}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>

        <!-- Grand Total Row -->
        <div class="grand-total-row">
          <div class="total-label">Grand total</div>
          <div class="total-url">{{ totalValue | number }}</div>
          <div class="total-percentage">{{ getTotalPercentage() }}</div>
        </div>

        <!-- Pagination -->
        <div class="pagination-container">
          <span class="pagination-info">1-3/3</span>
          <div class="pagination-controls">
            <button mat-icon-button disabled>
              <mat-icon>keyboard_arrow_left</mat-icon>
            </button>
            <button mat-icon-button disabled>
              <mat-icon>keyboard_arrow_right</mat-icon>
            </button>
          </div>
        </div>
      </div>
    </mat-expansion-panel>
  </mat-accordion>
</div>
